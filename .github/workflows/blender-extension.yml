name: blender-extension

on:
  push:
    branches:
      - master
      - blender-addon
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  extension:
    name: package extension zips
    needs: wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Package per-platform extension zips
        run: |
          python3 scripts/package_extension.py                     # Blender 5.1+
          python3 scripts/package_extension.py --python-tag cp311  # Blender 4.2-5.0

      - uses: actions/upload-artifact@v4
        with:
          name: blender-extension
          path: dist/autoremesher-*.zip

  publish:
    name: publish release
    needs: extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blender-extension
          path: dist

      - name: Create release and attach extension zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "AutoRemesher for Blender $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/autoremesher-*.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
